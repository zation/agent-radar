name: Release All

on:
  push:
    tags:
      - "all-v*"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  deployments: write

jobs:
  build-reviewed-bundle:
    name: Build reviewed bundle
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      issues: read
    env:
      AGENT_RADAR_LLM_API_KEY: ${{ secrets.AGENT_RADAR_LLM_API_KEY }}
      AGENT_RADAR_LLM_MODEL: ${{ vars.AGENT_RADAR_LLM_MODEL || 'deepseek-v4-flash' }}
      AGENT_RADAR_RELEASE_ID: ${{ github.ref_name }}
      AGENT_RADAR_COMMIT_SHA: ${{ github.sha }}
      AGENT_RADAR_CHECK_URLS: "true"
      AGENT_RADAR_PREVIOUS_URL_VALIDATION: previous-reviewed-bundle/dist-pages/data/tool_card_url_validation.v2.json
      AGENT_RADAR_PREVIOUS_DATA_QUALITY_REPORT: previous-reviewed-bundle/dist-pages/data/data_quality_report.json
      AGENT_RADAR_PREVIOUS_SOURCE_REGISTRY: previous-reviewed-bundle/dist-pages/data/source_registry.json
      AGENT_RADAR_PREVIOUS_INGESTION_REVIEW: previous-reviewed-bundle/dist-pages/data/review/ingestion.json
      AGENT_RADAR_RELEASE_TAG: ${{ github.ref_name }}
      AGENT_RADAR_FEEDBACK_BUILD_INPUT: feedback-build-input.json
    steps:
      - name: Validate immutable release tag
        run: |
          if [[ "$GITHUB_REF" != refs/tags/all-v* ]]; then
            echo "Release All only accepts immutable all-v* tags." >&2
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore previous reviewed baselines
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREVIOUS_RUN_ID="$(gh run list --workflow release-all.yml --status success --limit 1 --json databaseId --jq '.[0].databaseId // empty')"
          if [[ -n "$PREVIOUS_RUN_ID" ]]; then
            gh run download "$PREVIOUS_RUN_ID" --name "agent-radar-all-$PREVIOUS_RUN_ID" --dir previous-reviewed-bundle || true
          fi

      - name: Read production feedback aggregate
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: >-
          npx wrangler d1 execute agent-radar --remote --json
          --command "SELECT tool_id, SUM(CASE WHEN vote = 'up' THEN 1 ELSE 0 END) AS up_count, SUM(CASE WHEN vote = 'down' THEN 1 ELSE 0 END) AS down_count, COUNT(*) AS row_count FROM feedback_votes GROUP BY tool_id ORDER BY tool_id"
          > feedback-d1-query.json

      - name: Prepare feedback build input
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          test -f previous-reviewed-bundle/dist-pages/data/tool_cards.jsonl
          npm run feedback:prepare -- \
            --d1-query-json feedback-d1-query.json \
            --tool-cards previous-reviewed-bundle/dist-pages/data/tool_cards.jsonl \
            --output feedback-build-input.json

      - name: Build reviewed bundle
        run: npm run preview:build

      - name: Check data quality
        run: npm run data-quality:check -- dist-pages/data/data_quality_report.json

      - name: Check promotion candidates
        run: npm run promotion:check -- dist-pages/data/promotion_candidates/promotion_check.json

      - name: Verify Review Summary checksums
        run: npm run review-summary:check -- dist-pages

      - name: Validate Worker bundle
        run: npx --yes wrangler@latest deploy --dry-run --outdir worker-dry-run

      - name: Write review summary
        run: node dist/src/cli/render-review-summary.js >> "$GITHUB_STEP_SUMMARY"

      - name: Upload reviewed bundle
        uses: actions/upload-artifact@v7
        with:
          name: agent-radar-all-${{ github.run_id }}
          path: |
            dist-pages
            artifacts/review
            worker-dry-run
          if-no-files-found: error

  deploy-production:
    name: Deploy production Worker
    needs: build-reviewed-bundle
    runs-on: ubuntu-latest
    environment:
      name: production
    permissions:
      actions: read
      contents: read
      deployments: write
      issues: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Download reviewed bundle
        uses: actions/download-artifact@v8
        with:
          name: agent-radar-all-${{ github.run_id }}
          path: reviewed-bundle

      - name: Restore reviewed static assets
        run: |
          rm -rf dist-pages
          cp -R reviewed-bundle/dist-pages dist-pages

      - name: Apply approved feedback plan
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run feedback:apply -- --plan reviewed-bundle/dist-pages/data/feedback_processing_plan.json

      - name: Apply production D1 migrations
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler d1 migrations apply agent-radar --remote

      - name: Deploy Cloudflare Worker
        id: deploy
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: >
            deploy
            --name=${{ vars.CLOUDFLARE_PROJECT_NAME || 'agent-radar' }}
            --var AGENT_RADAR_RELEASE_ID:${{ github.ref_name }}
            --var AGENT_RADAR_COMMIT_SHA:${{ github.sha }}
            --var AGENT_RADAR_API_VERSION:${{ github.ref_name }}
            --var AGENT_RADAR_WEB_VERSION:${{ github.ref_name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke test deployed Worker MCP
        env:
          DEPLOY_OUTPUT: ${{ steps.deploy.outputs.command-output }}
        run: |
          set -euo pipefail
          npm run build
          WORKER_BASE_URL="$(printf '%s\n' "$DEPLOY_OUTPUT" | grep -Eo 'https://[^[:space:]]+\.workers\.dev' | tail -1)"
          if [ -z "$WORKER_BASE_URL" ]; then
            echo "Could not find workers.dev URL in wrangler deploy output." >&2
            exit 1
          fi
          echo "AGENT_RADAR_WORKER_BASE_URL=$WORKER_BASE_URL" >> "$GITHUB_ENV"
          AGENT_RADAR_MCP_BASE_URL="$WORKER_BASE_URL" node dist/src/cli/run-mcp-smoke.js | tee mcp-smoke-result.json

      - name: Resolve production deployment
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          CANDIDATE_IDS_OUTPUT="$(gh api --method GET "repos/${GITHUB_REPOSITORY}/deployments" \
            -f environment=production -f sha="$GITHUB_SHA" -f ref="$GITHUB_REF_NAME" \
            -f per_page=100 --paginate --jq '.[] | .id // empty')"
          CANDIDATE_IDS=()
          if [ -n "$CANDIDATE_IDS_OUTPUT" ]; then
            mapfile -t CANDIDATE_IDS <<< "$CANDIDATE_IDS_OUTPUT"
          fi

          MATCHING_DEPLOYMENT_IDS=()
          for CANDIDATE_ID in "${CANDIDATE_IDS[@]}"; do
            if [[ ! "$CANDIDATE_ID" =~ ^[0-9]+$ ]]; then
              continue
            fi
            STATUS_MATCHES="$(gh api --method GET \
              "repos/${GITHUB_REPOSITORY}/deployments/${CANDIDATE_ID}/statuses" \
              --paginate \
              --jq ".[] | select(((.log_url // \"\") | contains(\"/actions/runs/${GITHUB_RUN_ID}/\")) or ((.target_url // \"\") | contains(\"/actions/runs/${GITHUB_RUN_ID}/\"))) | .id")"
            if [ -n "$STATUS_MATCHES" ]; then
              MATCHING_DEPLOYMENT_IDS+=("$CANDIDATE_ID")
            fi
          done

          if [ "${#MATCHING_DEPLOYMENT_IDS[@]}" -ne 1 ]; then
            echo "Could not uniquely identify the production deployment for this workflow run." >&2
            exit 1
          fi
          echo "AGENT_RADAR_PRODUCTION_DEPLOYMENT_ID=${MATCHING_DEPLOYMENT_IDS[0]}" >> "$GITHUB_ENV"

      - name: Build production release evidence
        env:
          AGENT_RADAR_REVIEWED_BUNDLE: agent-radar-all-${{ github.run_id }}
        run: node dist/src/cli/build-production-evidence.js >> "$GITHUB_STEP_SUMMARY"

      - name: Record production deployment
        run: |
          {
            echo "## Agent Radar Production Deployment"
            echo
            echo "- Approved run: \`${GITHUB_RUN_ID}\`"
            echo "- SHA: \`${GITHUB_SHA}\`"
            echo "- Release tag: \`${GITHUB_REF_NAME}\`"
            echo "- Bundle: \`agent-radar-all-${GITHUB_RUN_ID}\`"
            echo
            echo "Production deployment used the reviewed bundle artifact instead of rebuilding data artifacts."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload production release evidence
        uses: actions/upload-artifact@v7
        with:
          name: agent-radar-mcp-smoke-${{ github.run_id }}
          path: |
            mcp-smoke-result.json
            production-release-evidence.json
          if-no-files-found: error
