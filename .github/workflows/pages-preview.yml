name: Pages Preview

on:
  push:
    tags:
      - "v*"
      - "[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build"
        required: false
        type: string

permissions:
  contents: read
  deployments: write

jobs:
  preview:
    name: Build and deploy preview
    runs-on: ubuntu-latest
    env:
      AGENT_RADAR_LLM_API_KEY: ${{ secrets.AGENT_RADAR_LLM_API_KEY }}
      AGENT_RADAR_LLM_MODEL: ${{ vars.AGENT_RADAR_LLM_MODEL || 'deepseek-v4-flash' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build preview bundle
        run: npm run preview:build

      - name: Check promotion candidates
        run: npm run promotion:check

      - name: Deploy Cloudflare Pages preview
        id: deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist-pages --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }} --branch=${{ github.ref_name }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Smoke test MCP endpoint
        if: ${{ vars.AGENT_RADAR_MCP_BASE_URL != '' }}
        env:
          AGENT_RADAR_MCP_BASE_URL: ${{ vars.AGENT_RADAR_MCP_BASE_URL }}
        run: |
          set -o pipefail
          npm run build
          node dist/src/cli/run-mcp-smoke.js | tee mcp-smoke-result.json

      - name: Write review summary
        env:
          DEPLOY_OUTPUT: ${{ steps.deploy.outputs.command-output }}
        run: |
          node dist/src/cli/render-review-summary.js >> "$GITHUB_STEP_SUMMARY"

      - name: Upload preview bundle
        uses: actions/upload-artifact@v4
        with:
          name: agent-radar-preview-${{ github.run_id }}
          path: |
            dist-pages
            artifacts/review
            mcp-smoke-result.json
          if-no-files-found: error

  promote-production:
    name: Approve production publish
    needs: preview
    runs-on: ubuntu-latest
    environment:
      name: production
    steps:
      - name: Download reviewed preview bundle
        uses: actions/download-artifact@v4
        with:
          name: agent-radar-preview-${{ github.run_id }}
          path: reviewed-preview

      - name: Deploy Cloudflare Pages production
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy reviewed-preview/dist-pages --project-name=${{ vars.CLOUDFLARE_PAGES_PROJECT_NAME }} --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Record production approval
        run: |
          {
            echo "## Agent Radar Production Approval"
            echo
            echo "- Approved run: \`${GITHUB_RUN_ID}\`"
            echo "- SHA: \`${GITHUB_SHA}\`"
            echo "- Bundle: \`agent-radar-preview-${GITHUB_RUN_ID}\`"
            echo "- Production branch: \`main\`"
            echo
            echo "Production deployment used the reviewed preview bundle artifact instead of rebuilding from source."
          } >> "$GITHUB_STEP_SUMMARY"
